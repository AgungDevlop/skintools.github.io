<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="monetag" content="d22eafaa4e1151646621f4ebc3947d81" />
    <title>Neon Core Engine (Neon Magisk Modules) - Get Your Download</title>
    <meta name="description" content="Neon Magisk Modules is a powerful optimization suite for Android 11+ devices, offering advanced tweaks for gaming, battery life, and system performance using the Magisk framework." />
    <meta name="keywords" content="Neon Core, Neon Magisk Modules, Android optimization, Magisk modules, performance tweaks, gaming performance, battery saver, Android 11, system optimization, Agung Developer" />
    <meta name="author" content="Agung Developer" />
    <meta name="robots" content="index, follow" />
    <link rel="icon" type="image/webp" href="img/icon.webp" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@next/dist/aos.css" rel="stylesheet" />
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        background-color: #030303;
        background-image: radial-gradient(circle at 50% 0%, #1a0000 0%, #030303 70%);
        color: #d1d5db;
        font-family: 'Chakra Petch', sans-serif;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
      }
      #particles-js {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }
      .rog-red {
        color: #ff003c;
      }
      .rog-neon {
        text-shadow: 0 0 10px rgba(255, 0, 60, 0.8), 0 0 20px rgba(255, 0, 60, 0.4);
      }
      .font-rajdhani {
        font-family: 'Rajdhani', sans-serif;
      }
      .rog-box {
        background: linear-gradient(145deg, #0f0000, #000000);
        border-left: 3px solid #ff003c;
        border-right: 1px solid rgba(255, 0, 60, 0.15);
        border-top: 1px solid rgba(255, 0, 60, 0.15);
        border-bottom: 1px solid rgba(255, 0, 60, 0.15);
        clip-path: polygon(25px 0, 100% 0, 100% calc(100% - 25px), calc(100% - 25px) 100%, 0 100%, 0 25px);
        box-shadow: 0 0 30px rgba(255, 0, 60, 0.15), inset 0 0 20px rgba(255, 0, 60, 0.05);
        position: relative;
      }
      .download-button {
        background: linear-gradient(45deg, #660000, #ff003c);
        clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        box-shadow: 0 0 20px rgba(255, 0, 60, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.2);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 16px 45px;
        font-size: 1.15rem;
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        color: white;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid #ff003c;
        cursor: pointer;
      }
      .download-button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(255, 0, 60, 0.6);
        background: linear-gradient(45deg, #880000, #ff1a4f);
      }
      main {
        flex: 1 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      footer {
        flex-shrink: 0;
        background: #050000;
        padding: 1.5rem 0;
        text-align: center;
        width: 100%;
        border-top: 1px solid rgba(255, 0, 60, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="particles-js"></div>

    <main>
      <div class="text-center p-8 md:p-12 rog-box max-w-2xl w-full" data-aos="zoom-in">
        <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#ff003c] to-transparent"></div>
        
        <div class="relative inline-block mb-6 p-1 bg-gradient-to-br from-[#ff003c] to-[#330000]" style="clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);">
          <img src="img/icon.webp" alt="Neon Core Icon" class="w-24 h-24 bg-[#050505] p-2" style="clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);" />
        </div>

        <h1 class="text-3xl md:text-4xl font-bold rog-red rog-neon font-rajdhani uppercase tracking-widest mb-3">Payload Ready</h1>
        <p class="text-sm md:text-base text-gray-400 mb-8 tracking-wide">Secure connection established. Click below to retrieve the Neon Core Engine.</p>
        
        <div id="download-section" class="space-y-4">
          <div id="apk-download" class="hidden">
            <button id="apk-download-btn" class="download-button">
              <i class="fas fa-download"></i> DOWNLOAD NEON CORE APK
            </button>
          </div>
          <div id="module-download" class="hidden">
            <button id="module-download-btn" class="download-button">
              <i class="fas fa-microchip"></i> DOWNLOAD MODULE
            </button>
          </div>
        </div>
        
        <div id="access-denied" class="hidden">
          <div class="bg-[#1a0000] border border-[#ff003c] p-4 rounded-lg inline-block" style="clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);">
            <p class="text-base text-[#ff4d6d] font-bold tracking-wider uppercase"><i class="fas fa-exclamation-triangle mr-2"></i> Access Denied</p>
            <p class="text-sm text-gray-400 mt-2">Please return to the <a href="index.html" class="underline text-[#ff003c] hover:text-white transition-colors">Main Console</a> to initiate the sequence properly.</p>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <p class="text-gray-500 font-bold text-xs tracking-[0.2em] font-rajdhani uppercase" data-aos="fade-up">
        <span class="rog-red">&copy;</span> 2025 Agung Developer. All Rights Reserved.
      </p>
    </footer>

    <script>
      AOS.init({
        duration: 800,
        easing: 'ease-in-out',
        once: true,
      });

      particlesJS('particles-js', {
        particles: {
          number: { value: 50, density: { enable: true, value_area: 1000 } },
          color: { value: '#ff003c' },
          shape: { type: 'polygon', stroke: { width: 0, color: '#000000' }, polygon: { nb_sides: 6 } },
          opacity: { value: 0.5, random: true },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 150, color: '#ff003c', opacity: 0.2, width: 1 },
          move: { enable: true, speed: 1.5, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false },
        },
        interactivity: {
          detect_on: 'canvas',
          events: { onhover: { enable: true, mode: 'grab' }, onclick: { enable: true, mode: 'push' }, resize: true },
          modes: { grab: { distance: 140, line_linked: { opacity: 0.5 } }, push: { particles_nb: 3 } },
        },
        retina_detect: true,
      });

      const apkDownloadBtn = document.getElementById('apk-download-btn');
      const moduleDownloadBtn = document.getElementById('module-download-btn');
      const downloadSection = document.getElementById('download-section');
      const apkDownloadDiv = document.getElementById('apk-download');
      const moduleDownloadDiv = document.getElementById('module-download');
      const accessDenied = document.getElementById('access-denied');
      const directDownloadLink = "https://omg10.com/4/10055984";
      const apkDownloadLink = "/base.apk";
      const downloadValue = sessionStorage.getItem('download');

      if (downloadValue) {
        downloadSection.classList.remove('hidden');
        accessDenied.classList.add('hidden');

        if (downloadValue === 'true') {
          apkDownloadDiv.classList.remove('hidden');
          apkDownloadBtn.addEventListener('click', () => {
            window.open(directDownloadLink, '_blank');
            setTimeout(() => {
              const link = document.createElement('a');
              link.href = apkDownloadLink;
              link.download = 'Neon_Core_Engine_V1.6.apk';
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              sessionStorage.removeItem('download');
            }, 2000);
          });
        } else {
          moduleDownloadDiv.classList.remove('hidden');
          moduleDownloadBtn.addEventListener('click', () => {
            window.open(downloadValue, '_blank');
            sessionStorage.removeItem('download');
          });
        }
      } else {
        downloadSection.classList.add('hidden');
        accessDenied.classList.remove('hidden');
      }

      document.querySelectorAll('a').forEach(link => {
        if(!link.classList.contains('download-button')) {
            link.addEventListener('mouseenter', () => {
              link.style.transform = 'scale(1.05)';
              link.style.transition = 'transform 0.3s ease-in-out';
              link.style.display = 'inline-block';
            });
            link.addEventListener('mouseleave', () => {
              link.style.transform = 'scale(1)';
            });
        }
      });
    </script>
  </body>
</html>
